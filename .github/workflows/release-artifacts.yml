name: Release Artifacts

on:
  release:
    types:
      - published
      - prereleased

permissions:
  contents: write

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  WORKER_URL: https://mesh-utility.org/api

jobs:
  # TODO(alpha6): Re-enable macOS and iOS artifact jobs here once platform
  # packaging/signing paths are stable. Keep release artifacts under this
  # single workflow trigger.
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Stage release artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/mesh-utility-${{ github.event.release.tag_name }}-android.apk"

      - name: Upload staged artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Stage release artifact
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf \
            "dist/mesh-utility-${{ github.event.release.tag_name }}-linux-x64.tar.gz" .

      - name: Upload staged artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Stage release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "dist/mesh-utility-${{ github.event.release.tag_name }}-windows-x64.zip"

      - name: Upload staged artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-web:
    name: Build Web (verification only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: flutter build web --release --dart-define=WORKER_URL=$WORKER_URL

  publish-release-assets:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-linux
      - build-windows
      - build-web
    steps:
      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/mesh-utility-${{ github.event.release.tag_name }}-android.apk
            dist/mesh-utility-${{ github.event.release.tag_name }}-linux-x64.tar.gz
            dist/mesh-utility-${{ github.event.release.tag_name }}-windows-x64.zip
            dist/SHA256SUMS.txt
