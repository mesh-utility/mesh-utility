name: Deploy

on:
  push:
    branches:
      - main
      - master
      - mesh-utility
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PAGES_PROJECT: mesh-utility-tracker
  PAGES_BRANCH: mesh-utility
  WORKER_URL: https://mesh-utility.org/api

jobs:
  deploy:
    name: Deploy Worker and Pages
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
        working-directory: worker

      - name: Build Flutter web
        run: |
          flutter pub get
          WORKER_URL="$WORKER_URL" ./tool/build_web_cloudflare.sh

      - name: Deploy Cloudflare Pages (production branch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy build/web --project-name "$PAGES_PROJECT" --branch "$PAGES_BRANCH"
