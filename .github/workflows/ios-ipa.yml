name: iOS Archive

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag / release tag to attach the unsigned iOS archive to
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ios-archive-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: true

jobs:
  build-ios-archive:
    name: Build Unsigned iOS Archive
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS archive
        run: |
          flutter build ipa --release --no-codesign

      - name: Package iOS archive
        run: |
          mkdir -p dist
          ARCHIVE_PATH="$(find build/ios/archive -maxdepth 1 -name '*.xcarchive' | head -n 1)"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "No .xcarchive found in build/ios/archive."
            exit 1
          fi
          tar -C "$(dirname "$ARCHIVE_PATH")" -czf \
            "dist/mesh-utility-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}-ios-xcarchive.tar.gz" \
            "$(basename "$ARCHIVE_PATH")"

      - name: Upload iOS archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive-${{ github.run_number }}
          path: dist/mesh-utility-*-ios-xcarchive.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Attach iOS archive to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
          files: dist/mesh-utility-*-ios-xcarchive.tar.gz
